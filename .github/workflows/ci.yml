name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      # Offline: the lexical stub embedder — no model download, no API keys.
      - run: npm test
        env:
          EMBED_PROVIDER: local
      - run: npm run test:distiller
        env:
          EMBED_PROVIDER: local
